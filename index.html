<!DOCTYPE html>
<html>
<head>
  <title>AI Chart Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #22c55e;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .result img {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }

    .loading {
      text-align: center;
      margin-top: 10px;
      color: #facc15;
    }
  </style>
</head>
<body>

<h1>AI Chart Analyzer</h1>

<div class="card">
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="uploadImage()">Analisa Chart</button>
  <div class="loading" id="loading"></div>
</div>

<div class="card result" id="result"></div>

<script>
async function uploadImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("Upload gambar dulu!");
    return;
  }

  document.getElementById("loading").innerText = "AI sedang menganalisa...";
  document.getElementById("result").innerHTML = "";

  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch("/api/analyze", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("loading").innerText = "";

  document.getElementById("result").innerHTML = `
    <h3>Hasil Analisa:</h3>
    <p>${data.analysis}</p>
    <img src="${data.originalImage}">
  `;
}
</script>

</body>
</html>
